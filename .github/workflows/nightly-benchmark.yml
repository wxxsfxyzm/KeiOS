name: Benchmark-CI

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build-benchmark-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      - name: Install Android 37 SDK components
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="$(command -v sdkmanager)"
          echo "Using sdkmanager: ${SDKMANAGER}"

          "${SDKMANAGER}" --channel=3 "build-tools;37.0.0"
          if "${SDKMANAGER}" --channel=3 "platforms;android-37.0"; then
            echo "Installed SDK platform: android-37.0"
          else
            "${SDKMANAGER}" --channel=3 "platforms;android-37"
            echo "Installed SDK platform: android-37"
          fi

      - name: Prepare Gradle credentials for GitHub Packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.gradle"
          {
            echo "gpr.user=${GITHUB_ACTOR}"
            echo "gpr.key=${GITHUB_TOKEN}"
          } >> "${HOME}/.gradle/gradle.properties"

      - name: Build benchmark APK
        run: ./gradlew :app:assembleBenchmark --stacktrace

      - name: Compose artifact filename
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME_UTC="$(date -u +'%Y%m%d-%H%M%S')"
          APK_FILE_NAME="KeiOS-benchmark-${BUILD_TIME_UTC}-${SHORT_SHA}.apk"
          ARTIFACT_NAME="KeiOS-benchmark-${BUILD_TIME_UTC}-${SHORT_SHA}-run${GITHUB_RUN_NUMBER}"
          echo "apk_file_name=${APK_FILE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="$(find app/build/outputs/apk/benchmark -maxdepth 2 -type f -name '*.apk' | head -n 1)"
          test -n "${APK_PATH}"
          cp "${APK_PATH}" "${RUNNER_TEMP}/${{ steps.meta.outputs.apk_file_name }}"

      - name: Upload benchmark APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.meta.outputs.apk_file_name }}
          if-no-files-found: error
          retention-days: 14
