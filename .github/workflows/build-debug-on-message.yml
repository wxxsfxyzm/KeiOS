name: Build Debug APK (Build-CI)

on:
  push:

permissions:
  contents: read

jobs:
  build-debug-apk:
    if: contains(join(github.event.commits.*.message, ' '), 'Build-CI')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 37 SDK components
        run: sdkmanager "platforms;android-37" "build-tools;37.0.0"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Compose artifact filename
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME_UTC="$(date -u +'%Y%m%d-%H%M%S')"
          APK_FILE_NAME="KeiOS-debug-${BUILD_TIME_UTC}-${SHORT_SHA}.apk"
          echo "apk_file_name=${APK_FILE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Prepare artifact
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "${RUNNER_TEMP}/${{ steps.meta.outputs.apk_file_name }}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: keiOS-debug-apk-${{ github.run_number }}
          path: ${{ runner.temp }}/${{ steps.meta.outputs.apk_file_name }}
          if-no-files-found: error
          retention-days: 14
